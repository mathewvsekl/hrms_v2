<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Log | HRMS V2</title>
    <link rel="icon" type="image/svg+xml" href="avant-garde-logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="shared-styles.css">
    <style>
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-top: 16px;
        }

        .calendar-day-header {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            padding: 8px 0;
        }

        .calendar-day {
            aspect-ratio: 1;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-main);
            cursor: default;
            position: relative;
        }

        .calendar-day.present {
            background: var(--success-light);
            color: var(--success);
        }

        .calendar-day.absent {
            background: var(--danger-light);
            color: var(--danger);
        }

        .calendar-day.half_day {
            background: var(--warning-light);
            color: var(--warning);
        }

        .calendar-day.late {
            background: rgba(251, 191, 36, 0.15);
            color: #d97706;
        }

        .calendar-day.on_leave {
            background: var(--purple-light);
            color: var(--purple);
        }

        .calendar-day.weekend {
            background: var(--border-light);
            color: var(--text-muted);
        }

        .calendar-day.holiday {
            background: var(--info-light);
            color: var(--info);
        }

        .calendar-day.empty {
            background: transparent;
        }

        .calendar-day.today {
            box-shadow: inset 0 0 0 2px var(--primary);
        }

        .view-toggle {
            display: flex;
            gap: 2px;
            background: var(--border-light);
            border-radius: var(--radius);
            padding: 2px;
        }

        .view-toggle-btn {
            padding: 6px 14px;
            border: none;
            background: none;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }

        .view-toggle-btn.active {
            background: var(--surface);
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>

<body>
    <div class="page-container">
        <div class="page-header">
            <h1>Attendance Log</h1>
            <p>Track daily attendance across all offices</p>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon green"><i class="ri-user-follow-line"></i></div>
                <div>
                    <div class="stat-value" id="stat-present">9</div>
                    <div class="stat-label">Present Today</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red"><i class="ri-user-unfollow-line"></i></div>
                <div>
                    <div class="stat-value" id="stat-absent">3</div>
                    <div class="stat-label">Absent</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange"><i class="ri-time-line"></i></div>
                <div>
                    <div class="stat-value" id="stat-late">1</div>
                    <div class="stat-label">Late Arrivals</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple"><i class="ri-umbrella-line"></i></div>
                <div>
                    <div class="stat-value" id="stat-leave">2</div>
                    <div class="stat-label">On Leave</div>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="toolbar-group">
                <input type="date" class="form-control form-control-sm" id="date-picker" style="width:170px;">
                <select class="form-control form-control-sm" id="filter-office" style="width:200px;">
                    <option value="">All Offices</option>
                    <option>Kampala HQ</option>
                    <option>Dubai Office</option>
                    <option>Mumbai Office</option>
                    <option>Nairobi Office</option>
                    <option>Dar es Salaam Office</option>
                </select>
                <select class="form-control form-control-sm" id="filter-att-status" style="width:160px;">
                    <option value="">All Statuses</option>
                    <option value="present">Present</option>
                    <option value="absent">Absent</option>
                    <option value="half_day">Half Day</option>
                    <option value="late">Late</option>
                    <option value="on_leave">On Leave</option>
                </select>
            </div>
            <div class="toolbar-group">
                <div class="view-toggle">
                    <button class="view-toggle-btn active" onclick="switchView('table', this)"><i
                            class="ri-list-check"></i> Table</button>
                    <button class="view-toggle-btn" onclick="switchView('calendar', this)"><i
                            class="ri-calendar-2-line"></i> Calendar</button>
                </div>
                <button class="btn btn-primary btn-sm" id="manual-entry-btn"
                    onclick="ModalManager.open('manual-entry-modal')" style="display:none;">
                    <i class="ri-add-line"></i> Manual Entry
                </button>
            </div>
        </div>

        <!-- Table View -->
        <div class="card" style="padding:0; overflow:hidden;" id="table-view">
            <div id="attendance-table"></div>
        </div>

        <!-- Calendar View -->
        <div class="card" id="calendar-view" style="display:none;">
            <div class="card-header">
                <span class="card-title"><i class="ri-calendar-2-line"></i> Monthly Overview</span>
            </div>
            <div class="calendar-grid" id="calendar-grid">
                <!-- Headers and days will be injected here -->
            </div>
            <div style="display:flex;gap:16px;margin-top:16px;font-size:11px;color:var(--text-muted);flex-wrap:wrap;"
                id="calendar-legend">
                <span><span
                        style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--success-light);margin-right:4px;vertical-align:middle;"></span>Present</span>
                <span><span
                        style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--danger-light);margin-right:4px;vertical-align:middle;"></span>Absent</span>
                <span><span
                        style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--warning-light);margin-right:4px;vertical-align:middle;"></span>Late</span>
                <span><span
                        style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--purple-light);margin-right:4px;vertical-align:middle;"></span>On
                    Leave</span>
                <span><span
                        style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--border-light);margin-right:4px;vertical-align:middle;"></span>Weekend</span>
            </div>
        </div>
    </div>

    <!-- Manual Entry Modal -->
    <div class="modal-overlay" id="manual-entry-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Manual Attendance Entry</h2>
                <button class="modal-close"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <form id="manual-form" onsubmit="submitManualEntry(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Employee <span class="required">*</span></label>
                            <select class="form-control" name="employee_id" required>
                                <option value="">Select employee...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Status <span class="required">*</span></label>
                            <select class="form-control" name="status" required>
                                <option value="present">Present</option>
                                <option value="absent">Absent</option>
                                <option value="half_day">Half Day</option>
                                <option value="late">Late</option>
                                <option value="on_leave">On Leave</option>
                            </select>
                        </div>
                        <div class="form-group" id="manual-time-fields"
                            style="display:none; grid-column: span 2; display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                            <div>
                                <label class="form-label">Check-In</label>
                                <input type="time" class="form-control" name="check_in">
                            </div>
                            <div>
                                <label class="form-label">Check-Out</label>
                                <input type="time" class="form-control" name="check_out">
                            </div>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top:16px;">
                        <input type="hidden" name="attendance_date" value="">
                        <p class="text-xs text-muted">Target Date: <strong id="modal-date-display">...</strong></p>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline"
                    onclick="ModalManager.close('manual-entry-modal')">Cancel</button>
                <button type="submit" form="manual-form" class="btn btn-primary"><i class="ri-check-line"></i> Save
                    Entry</button>
            </div>
        </div>
    </div>

    <script src="table-component.js"></script>
    <script>
        let attendanceTable;

        document.addEventListener('DOMContentLoaded', () => {
            attendanceTable = new DataTable('#attendance-table', {
                columns: [
                    { key: 'first_name', label: 'Employee', sortable: true, primary: true },
                    { key: 'attendance_date', label: 'Date', sortable: true },
                    { key: 'check_in_utc', label: 'Check-In', sortable: true },
                    { key: 'check_out_utc', label: 'Check-Out', sortable: true },
                    { key: 'source', label: 'Source', sortable: true },
                    { key: 'status', label: 'Status', sortable: true }
                ],
                data: [], // Initially empty
                pageSize: 12,
                renderCell: {
                    first_name: (val, row) => `<a href="javascript:void(0)" onclick="openProfile(${row.employee_id})" style="color:var(--primary); font-weight:600; text-decoration:none;">${val} ${row.last_name}</a>`,
                    status: (val) => statusBadge(val),
                    source: (val) => !val || val === '—' ? `<span style="color:var(--text-muted)">—</span>` : `<span class="badge badge-gray">${val}</span>`
                }
            });

            loadAttendance();
            loadEmployees();
            checkRBAC();

            // Link filters
            document.getElementById('date-picker').addEventListener('change', loadAttendance);
            document.getElementById('filter-office').addEventListener('change', loadAttendance);
            document.getElementById('filter-att-status').addEventListener('change', loadAttendance);
        });

        function checkRBAC() {
            const role = localStorage.getItem('user_role') || 'employee';
            if (role !== 'employee') {
                document.getElementById('manual-entry-btn').style.display = 'flex';
            }
        }

        async function loadAttendance() {
            const date = document.getElementById('date-picker').value || new Date().toISOString().split('T')[0];
            const officeId = document.getElementById('filter-office').value;
            const status = document.getElementById('filter-att-status').value;

            const res = await API.get(`/api/attendance?date=${date}&office_id=${officeId}&status=${status}`);
            if (!res.error) {
                attendanceTable.setData(res.data || []);
                updateStats(res.data || []);
                renderCalendar(date, res.data || []);

                // Set modal date and check mode
                document.querySelector('input[name="attendance_date"]').value = date;
                document.getElementById('modal-date-display').innerText = date;

                if (res.data && res.data.length > 0) {
                    toggleManualFields(res.data[0].attendance_mode);
                }
            }
        }

        function renderCalendar(dateStr, data) {
            const grid = document.getElementById('calendar-grid');
            const d = new Date(dateStr);
            const month = d.getMonth();
            const year = d.getFullYear();

            grid.innerHTML = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']
                .map(h => `<div class="calendar-day-header">${h}</div>`).join('');

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += '<div class="calendar-day empty"></div>';
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

                // For global view, we mark any status found for this day in the data
                // This is a simplified per-day status summary
                const statuses = data.filter(r => r.attendance_date === dateKey).map(r => r.status);
                let statusClass = '';
                if (statuses.includes('absent')) statusClass = 'absent';
                else if (statuses.includes('late')) statusClass = 'late';
                else if (statuses.includes('on_leave')) statusClass = 'on_leave';
                else if (statuses.includes('present')) statusClass = 'present';

                const isToday = new Date().toISOString().split('T')[0] === dateKey ? 'today' : '';
                grid.innerHTML += `<div class="calendar-day ${statusClass} ${isToday}">${day}</div>`;
            }

            document.querySelector('#calendar-view .card-title').innerHTML =
                `<i class="ri-calendar-2-line"></i> Monthly Overview — ${d.toLocaleString('default', { month: 'long' })} ${year}`;
        }

        function toggleManualFields(mode) {
            const timeFields = document.getElementById('manual-time-fields');
            if (mode === 'status_based') {
                timeFields.style.display = 'none';
            } else {
                timeFields.style.display = 'grid';
            }
        }

        async function loadEmployees() {
            const res = await API.get('/api/employees');
            if (!res.error) {
                const select = document.querySelector('select[name="employee_id"]');
                select.innerHTML = '<option value="">Select employee...</option>' +
                    res.data.map(e => `<option value="${e.id}">${e.first_name} ${e.last_name} (${e.employee_code})</option>`).join('');
            }
        }

        function updateStats(data) {
            document.getElementById('stat-present').innerText = data.filter(r => r.status === 'present').length;
            document.getElementById('stat-absent').innerText = data.filter(r => r.status === 'absent').length;
            document.getElementById('stat-late').innerText = data.filter(r => r.status === 'late').length;
            document.getElementById('stat-leave').innerText = data.filter(r => r.status === 'on_leave').length;
        }

        function switchView(view, btn) {
            document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('table-view').style.display = view === 'table' ? 'block' : 'none';
            document.getElementById('calendar-view').style.display = view === 'calendar' ? 'block' : 'none';
        }

        async function submitManualEntry(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const payload = Object.fromEntries(formData.entries());

            const res = await API.post('/api/attendance', payload);
            if (!res.error) {
                alert('Manual entry saved successfully.');
                ModalManager.close('manual-entry-modal');
                loadAttendance();
            } else {
                alert('Error saving attendance: ' + res.message);
            }
        }

        function openProfile(id) {
            const route = 'employee-profile?id=' + id;
            if (window.parent && window.parent !== window) {
                window.parent.location.hash = '#' + route;
            } else {
                window.location.href = 'employee-profile.html?id=' + id;
            }
        }
    </script>
</body>

</html>
