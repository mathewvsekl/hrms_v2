<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | HRMS Portal</title>
    <link rel="icon" type="image/svg+xml" href="avant-garde-logo.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0F5E3A;
            --primary-hover: #0B3E28;
            --bg: #f3f4f6;
            --surface: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
        }

        .login-card {
            background: var(--surface);
            width: 60vw;
            aspect-ratio: 25 / 14;
            border-radius: 1vw;
            box-shadow: var(--shadow);
            display: flex;
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Decorative Left Panel --- */
        .brand-side {
            flex: 1.1;
            background: linear-gradient(135deg, #0B3E28 0%, #0F5E3A 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4vw;
            position: relative;
            color: #ffffff;
            text-align: center;
        }

        .brand-side::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.3;
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 1.5vw;
            margin-bottom: 4vw;
            position: relative;
            z-index: 1;
        }

        .logo-group img {
            max-height: 5vw;
        }

        .brand-side h2 {
            font-size: 1.6vw;
            font-weight: 400;
            line-height: 1.4;
            max-width: 25vw;
            position: relative;
            z-index: 1;
            opacity: 0.9;
        }

        /* --- Auth Right Panel --- */
        .auth-side {
            flex: 1;
            padding: 4vw 4.5vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .auth-side .auth-logo {
            width: 60%;
            height: auto;
            margin-bottom: 2vw;
            display: block;
        }

        .auth-side h1 {
            font-size: 1.8vw;
            font-weight: 700;
            margin-bottom: 2vw;
            color: #1a1a1a;
            text-align: center;
        }

        #login-form {
            width: 100%;
            max-width: 25vw;
        }

        .form-label {
            display: block;
            font-size: 0.85vw;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 0.6vw;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 1.8vw;
        }

        .input-wrapper i {
            position: absolute;
            left: 1vw;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1.2vw;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.8vw 1vw 0.8vw 3vw;
            border: 1px solid var(--border);
            border-radius: 0.5vw;
            font-size: 0.9vw;
            font-family: inherit;
            transition: all 0.2s;
            background-color: #ffffff;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 0.25vw rgba(0, 93, 50, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 1vw;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 0.5vw;
            font-size: 1vw;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.6vw;
        }

        .login-btn:hover {
            background-color: var(--primary-hover);
        }

        .error-msg {
            margin-top: 1.2vw;
            color: #dc2626;
            font-size: 0.85vw;
            display: none;
            align-items: center;
            gap: 0.5vw;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .login-card {
                flex-direction: column;
                height: auto;
                width: 440px;
            }

            .brand-side {
                padding: 40px;
            }

            .auth-side {
                padding: 40px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <!-- Brand Side -->
        <div class="brand-side">
            <h2>Enterprise Human Resources & Employee Self-Service Portal</h2>
        </div>

        <!-- Auth Side -->
        <div class="auth-side">
            <img src="LOGO.png" alt="Vision Group Logo" class="auth-logo">
            <h1>Sign In</h1>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <i class="ri-user-line"></i>
                        <input type="email" id="email" placeholder="c.g.jdoe@visionug.com" required>
                    </div>
                </div>

                <div id="password-group" style="display:none;">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper">
                        <i class="ri-lock-line"></i>
                        <input type="password" id="password" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="login-btn" id="login-btn">
                    Sign In to Portal
                </button>

                <div class="error-msg" id="error-msg">
                    <i class="ri-error-warning-line"></i>
                    <span id="error-text"></span>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Simple state to handle the two-step-like look in the screenshot 
        // (Even though it looks like just email, usually it asks for password next or is a unified form)
        // I will implement a standard login but following the single-input lead from the UI.

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const emailInput = document.getElementById('email');
            const passGroup = document.getElementById('password-group');
            const passInput = document.getElementById('password');
            const errDiv = document.getElementById('error-msg');
            const errText = document.getElementById('error-text');

            // If password is not yet shown, show it (simulating the modern flow)
            if (passGroup.style.display === 'none') {
                passGroup.style.display = 'block';
                passInput.required = true;
                btn.textContent = 'Verify Identity';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Authenticating...';
            errDiv.style.display = 'none';

            const username = emailInput.value.trim();
            const password = passInput.value;

            try {
                // Determine base URL dynamically
                const baseUrl = window.location.origin;
                const response = await fetch(baseUrl + '/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    // Success! Store token and redirect
                    localStorage.setItem('api_token', data.data.token);
                    window.location.href = data.data.redirect_url || 'index.html';
                } else {
                    throw new Error(data.message || 'Invalid credentials');
                }
            } catch (err) {
                console.error('Auth error:', err);
                errText.textContent = err.message || 'Connection failed. Please try again.';
                errDiv.style.display = 'flex';
                btn.disabled = false;
                btn.textContent = 'Sign In to Portal';
            }
        }
    </script>

</body>

</html>
